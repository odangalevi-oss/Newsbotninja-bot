{% extends "base.html" %}

{% block title %}Register - Newsbotninja{% endblock %}

{% block content %}
<div class="form-container">
    <h2>Create Account</h2>
    <form method="POST">
        <div class="form-group">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" required minlength="3" placeholder="Choose your username">
        </div>
        
        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" required placeholder="your@email.com">
        </div>
        
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" required minlength="6" placeholder="At least 6 characters">
        </div>
        
        <button type="submit" class="btn btn-primary" style="width: 100%;">Register</button>
    </form>
    
    <p style="text-align: center; margin-top: 1.5rem;">
        Already have an account? <a href="{{ url_for('login') }}" style="color: #667eea; text-decoration: none;">Login here</a>
    </p>
</div>
{% endblock %}
